[build]
builder = "nixpacks"

[deploy]
# Политика перезапуска (Restart Policy):
# - on_failure — перезапуск при падении (exit code != 0, в т.ч. OOM kill 137). По умолчанию.
# - always — перезапуск при любом завершении (если бот «завис» и его убивают — тоже перезапуск).
# - never — не перезапускать.
# На Free-плане: on_failure до 10 перезапусков; always недоступен.
restartPolicyType = "always"
